<!DOCTYPE html>
<html>
  <head>
    <title>Histo Atlas - Soutenir le projet</title>
    <link rel="icon" type="image/png" href="../img/icon.png" />
    <link rel="stylesheet" href="../styles/index.css" />
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
  </head>
  <body>

  <link rel="stylesheet" href="../index.css?v=10" />

  <script type="text/javascript" src="../node_modules/jquery/dist/jquery.min.js"></script>

  <link href="../libs/fontawesome-free-6.2.0-web/css/fontawesome.css" rel="stylesheet">
  <link href="../libs/fontawesome-free-6.2.0-web/css/brands.css" rel="stylesheet">
  <link href="../libs/fontawesome-free-6.2.0-web/css/solid.css" rel="stylesheet">

  <div id="index-page-content">

    <div class="page-head">
      <a href="../index.html" class="back-menu-link"></a>
      <div id="menu-change-lang"></div>
    </div>

    <div class="page-content">
      <h3 id="support-title">Soutenir le projet</h3>

      <p id="support-line1">Pour soutenir le projet vous pouvez le partager le projet, contribuer à son code source, créer vos cartes et les partagées.</p>
      <p id="support-line2">Si vous souhaitez soutenir financièrement le projet, <a href="contact.html">contacter moi</a></p>
    </div>
  </div>

  <script type="text/javascript" src="../config/config.js?v=9"></script>
  <script type="text/javascript" src="../dictionary/dictionary.js?v=9"></script>
  <script type="text/javascript" src="menu.js?v=9"></script>

  <script>

    Menu.loadDictionnary().then((config) =>
    {
      $("#link-back-menu").html(Dictionary.get('BACK_MENU'));
      $("#support-title").html(Dictionary.get('SUPPORT_TITLE'));
      $("#support-line1").html(Dictionary.get('SUPPORT_LINE1'));
      $("#support-line2").html(Dictionary.get('SUPPORT_LINE2'));

      document.title = "Histo Atlas - " + Dictionary.get('SUPPORT_TITLE');
    });

  </script>

  </body>
</html>
